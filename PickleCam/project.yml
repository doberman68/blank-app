name: PickleCam
options:
  bundleIdPrefix: com.yourteam
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  PickleCamApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PickleCamApp
        excludes:
          - "Resources/**"
    resources:
      - path: PickleCamApp/Resources
    info:
      path: PickleCamApp/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "PickleCam needs camera access to record your pickleball game."
        NSMicrophoneUsageDescription: "PickleCam records court audio to go with your video."
        NSPhotoLibraryAddUsageDescription: "PickleCam saves exported clips to your Photo Library."
        UIBackgroundModes:
          - audio
        WKWatchOnly: false
    entitlements:
      path: PickleCamApp/Resources/PickleCamApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourteam.PickleCam
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PickleCamApp/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""   # Fill in your Apple Developer Team ID
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - target: PickleCamWatchApp
        embed: true

  PickleCamWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PickleCamWatchApp
        excludes:
          - "Resources/**"
    resources:
      - path: PickleCamWatchApp/Resources
    info:
      path: PickleCamWatchApp/Resources/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.yourteam.PickleCam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourteam.PickleCam.watchkitapp
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_FILE: PickleCamWatchApp/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""   # Fill in your Apple Developer Team ID
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

schemes:
  PickleCam:
    build:
      targets:
        PickleCamApp: all
        PickleCamWatchApp: all
    run:
      config: Debug
      targets:
        - PickleCamApp
    test:
      config: Debug
    archive:
      config: Release
