<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Extension Icons</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #1d1d1f; }
    canvas { border: 1px solid #d2d2d7; margin: 10px; }
    .canvas-container { margin: 20px 0; }
    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover { background: #0055b3; }
    .info { background: #f5f5f7; padding: 20px; border-radius: 8px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>Extension Icon Generator</h1>

  <div class="info">
    <p>This page generates the required icon files for the Safari extension.</p>
    <p>Click the download buttons below to save each icon size.</p>
  </div>

  <div class="canvas-container">
    <h2>48x48</h2>
    <canvas id="icon48" width="48" height="48"></canvas>
    <br>
    <button onclick="downloadIcon('icon48', 'icon-48.png')">Download 48x48</button>
  </div>

  <div class="canvas-container">
    <h2>96x96</h2>
    <canvas id="icon96" width="96" height="96"></canvas>
    <br>
    <button onclick="downloadIcon('icon96', 'icon-96.png')">Download 96x96</button>
  </div>

  <div class="canvas-container">
    <h2>128x128</h2>
    <canvas id="icon128" width="128" height="128"></canvas>
    <br>
    <button onclick="downloadIcon('icon128', 'icon-128.png')">Download 128x128</button>
  </div>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 128;

      // Background with rounded corners
      ctx.fillStyle = '#0066cc';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, 20 * scale);
      ctx.fill();

      // Draw three folders
      ctx.save();
      ctx.scale(scale, scale);
      ctx.translate(24, 24);

      // Folder 1
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillRect(8, 10, 24, 5);
      ctx.fillStyle = 'rgba(255, 255, 255, 1)';
      ctx.fillRect(8, 15, 24, 13);

      // Folder 2
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillRect(24, 25, 24, 5);
      ctx.fillStyle = 'rgba(255, 255, 255, 1)';
      ctx.fillRect(24, 30, 24, 13);

      // Folder 3
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fillRect(40, 40, 24, 5);
      ctx.fillStyle = 'rgba(255, 255, 255, 1)';
      ctx.fillRect(40, 45, 24, 13);

      // Numbers
      ctx.fillStyle = '#0066cc';
      ctx.font = 'bold 10px Arial';
      ctx.fillText('1', 19, 24);
      ctx.fillText('2', 35, 39);
      ctx.fillText('3', 51, 54);

      ctx.restore();
    }

    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Draw all icons on page load
    window.addEventListener('load', () => {
      drawIcon(document.getElementById('icon48'));
      drawIcon(document.getElementById('icon96'));
      drawIcon(document.getElementById('icon128'));
    });
  </script>
</body>
</html>
